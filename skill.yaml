name: drugclaw
version: 0.2.0
description: "DrugClaw: AI-powered drug discovery assistant with agentic retrieval and 15-category skill tree"
author: DrugClaw Contributors
homepage: https://github.com/caroline-li-bot/DrugClaw
license: MIT

tags:
  - drug-discovery
  - cheminformatics
  - virtual-screening
  - admet
  - drug-target-interaction
  - adverse-drug-reactions
  - pharmacogenomics
  - drug-repurposing
  - literature-analysis
  - agentic-rag

dependencies:
  python: >=3.9
  pip:
    - openai>=1.0.0
    - langchain>=0.1.0
    - rdkit>=2022.09.1
    - supabase>=2.0.0
    - flask>=2.0.0
    - pandas>=2.0.0
    - numpy>=1.24.0
    - scikit-learn>=1.2.0
    - matplotlib>=3.7.0
    - plotly>=5.15.0
    - transformers>=4.30.0
    - torch>=2.0.0
    - biopython>=1.83
    - pubchempy>=1.0.4
    - requests>=2.31.0
    - beautifulsoup4>=4.12.3
    - scipy>=1.12.0
    - tqdm>=4.66.2

system_dependencies:
  - autodock-vina (optional, for virtual screening)
  - mgltools (optional, for virtual screening)
  - pymol (optional, for visualization)

commands:
  list:
    description: List all available skills and categories
    executable: python -m drugclaw list

  doctor:
    description: Check configuration health
    executable: python -m drugclaw doctor

  demo:
    description: Run demo query (metformin safety information)
    executable: python -m drugclaw demo

  run:
    description: Run a custom query
    parameters:
      query:
        type: string
        description: Query text
        required: true
      key-file:
        type: string
        description: API key configuration file
        default: navigator_api_keys.json
      thinking-mode:
        type: string
        description: Thinking mode (simple/graph/web_only)
      show-plan:
        type: boolean
        description: Show query analysis plan
        default: false
      show-evidence:
        type: boolean
        description: Show raw evidence
        default: false
      save-md-report:
        type: boolean
        description: Save result as Markdown report
        default: false
    executable: python -m drugclaw run

  literature-analyze:
    description: Legacy: Literature analysis (deprecated, use run instead)
    parameters:
      keyword:
        type: string
        description: Search keyword
        required: true
      output:
        type: string
        description: Output report path
        default: literature_report.md
      max-papers:
        type: integer
        description: Maximum papers
        default: 50
    executable: python skills/literature_analysis.py

  admet-predict:
    description: Legacy: ADMET property prediction (deprecated, use run instead)
    parameters:
      smiles:
        type: string
        description: Single SMILES
      input:
        type: string
        description: Input CSV with smiles column
      output:
        type: string
        description: Output CSV
        default: admet_results.csv
    executable: python skills/admet_prediction.py

  virtual-screening:
    description: Legacy: Virtual screening (deprecated, use run instead)
    parameters:
      target-pdb:
        type: string
        description: Target PDB file
        required: true
      library-file:
        type: string
        description: Compound library CSV with smiles
        required: true
      center-x:
        type: float
        description: Binding site center X
        required: true
      center-y:
        type: float
        description: Binding site center Y
        required: true
      center-z:
        type: float
        description: Binding site center Z
        required: true
      output:
        type: string
        description: Output CSV
        default: screening_results.csv
    executable: python skills/virtual_screening.py

skill_categories:
  - dti: Drug-Target Interactions
  - adr: Adverse Drug Reactions
  - ddi: Drug-Drug Interactions
  - pgx: Pharmacogenomics
  - repurposing: Drug Repurposing
  - knowledgebase: Drug Knowledgebases
  - mechanism: Mechanisms of Action
  - labeling: Drug Labeling
  - toxicity: Drug Toxicity
  - ontology: Ontology & Normalization
  - combination: Drug Combinations
  - properties: Molecular Properties
  - disease: Drug-Disease Associations
  - reviews: Patient Reviews
  - nlp: NLP Datasets

examples:
  - description: Find all known targets of imatinib
    command: drugclaw run --query "What are the known drug targets of imatinib?"

  - description: Check for interactions between warfarin and NSAIDs
    command: drugclaw run --query "Are there clinically significant interactions between warfarin and ibuprofen?"

  - description: Predict ADMET properties for a compound
    command: drugclaw run --query "Predict ADMET properties for this SMILES: C1=CC(=C(C=C1Cl)Cl)O"

  - description: Drug repurposing for triple-negative breast cancer
    command: drugclaw run --query "Which approved drugs can be repurposed for triple-negative breast cancer?"

repository: https://github.com/caroline-li-bot/DrugClaw
issues: https://github.com/caroline-li-bot/DrugClaw/issues
